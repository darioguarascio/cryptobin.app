name: Build and Push

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  actions: read

env:
  IMAGE_NAME: darioguarascio/cryptobin.app

jobs:
  wait-for-tests:
    name: Wait for Test workflow
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Test workflow on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          for attempt in $(seq 1 40); do
            json="$(gh run list --repo "${GITHUB_REPOSITORY}" --workflow Test --commit "${GITHUB_SHA}" --json status,conclusion 2>/dev/null || echo '[]')"
            count="$(printf '%s' "$json" | jq 'length')"
            if [ "$count" -eq 0 ]; then
              echo "No Test runs yet for ${GITHUB_SHA}; waiting…"
              sleep 15
              continue
            fi
            pending="$(printf '%s' "$json" | jq '[.[] | select(.status != "completed")] | length')"
            failed="$(printf '%s' "$json" | jq '[.[] | select(.status == "completed" and .conclusion != "success")] | length')"
            if [ "$failed" -gt 0 ]; then
              echo "Test workflow failed for ${GITHUB_SHA}"
              gh run list --repo "${GITHUB_REPOSITORY}" --workflow Test --commit "${GITHUB_SHA}"
              exit 1
            fi
            if [ "$pending" -eq 0 ]; then
              echo "All Test workflows succeeded for ${GITHUB_SHA}"
              exit 0
            fi
            echo "Waiting for ${pending} Test run(s)…"
            sleep 15
          done
          echo "Timed out waiting for Test workflow on ${GITHUB_SHA}"
          exit 1

  build:
    name: Build Docker image
    needs: wait-for-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve image tag
        id: meta
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.tag }}
            APP_COMMIT=${{ github.sha }}
          tags: |
            docker.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
