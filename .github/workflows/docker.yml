name: Build and Push

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  actions: read

env:
  IMAGE_NAME: darioguarascio/cryptobin.app

jobs:
  wait-for-tests:
    name: Wait for Test workflow
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Test workflow on this commit
        uses: lewagon/wait-on-check-action@v1.1.0
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          running-workflow-name: Test
          allowed-conclusions: success
          wait-interval: 15

  build:
    name: Build Docker image
    needs: wait-for-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve image tag
        id: meta
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.tag }}
            APP_COMMIT=${{ github.sha }}
          tags: |
            docker.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
