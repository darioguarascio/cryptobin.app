services:
  app:
    image: darioguarascio/cryptobin.app:${IMAGE_TAG}
    container_name: cryptobin.app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-127.0.0.1:18080}:4321"
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      SITE_URL: ${SITE_URL}
      CRYPTOBIN_URL: ${CRYPTOBIN_URL:-${SITE_URL}}
      SECRET_TTL_HOURS: ${SECRET_TTL_HOURS:-24}
      RYBBIT_HOST: ${RYBBIT_HOST:-}
      RYBBIT_SITE_ID: ${RYBBIT_SITE_ID:-}
      GITHUB_REPO_URL: ${GITHUB_REPO_URL:-}
      DATABASE_URL: ${DATABASE_URL}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      TZ: ${TZ:-Europe/Rome}
